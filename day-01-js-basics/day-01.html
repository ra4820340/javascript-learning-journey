<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <script>
        // 1. Even or odd
let number = 10;

if (number % 2 === 0) {
  console.log(number + " is Even");
} else {
  console.log(number + " is Odd");
}

// 2. Largest of three numbers
let num1 = 25;
let num2 = 40;
let num3 = 15;

if (num1 >= num2 && num1 >= num3) {
  console.log(num1 + " is largest");
} else if (num2 >= num1 && num2 >= num3) {
  console.log(num2 + " is largest");
} else {
  console.log(num3 + " is largest");
}

// 3. Print numbers from 1 to 50
for (let num = 1; num <= 50; num++) {
  console.log(num);
}

// 4. Print even numbers from 1 to 100
for (let num = 2; num <= 100; num += 2) {
  console.log(num);
}

// 5. Student object
let student = {
  name: "Rehan",
  age: 18,
  city: "Nanded",
  course: "BCS",
  skills: ["JavaScript", "Java", "Python", "C"]
};

console.log(student);

// 6. Marks total and average
let marks = [56, 78, 78, 34, 89];
let total = 0;

for (let i = 0; i < marks.length; i++) {
  total = total + marks[i];
}

let average = total / marks.length;

console.log("Total marks: " + total);
console.log("Average marks: " + average);

// 7. Reverse a string
let str = "hello";
let reversed = "";

for (let ch of str) {
  reversed = ch + reversed;
}

console.log("Reversed string: " + reversed);

// 8. Maximum number in array
let numbers = [2, 5, 6, 7, 8, 4];
let max = numbers[0];

for (let i = 1; i < numbers.length; i++) {
  if (numbers[i] > max) {
    max = numbers[i];
  }
}

console.log("Max number is: " + max);

// 9. Count vowels in a string
let text = "Rehan ahmed";
let vowelCount = 0;

for (let i = 0; i < text.length; i++) {
  let ch = text[i].toLowerCase();

  if (ch === "a" || ch === "e" || ch === "i" || ch === "o" || ch === "u") {
    vowelCount++;
  }
}

console.log("Vowel count is: " + vowelCount);
    </script>
</body>
</html>
